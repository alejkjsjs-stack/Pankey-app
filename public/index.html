<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, shrink-to-fit=no, viewport-fit=cover" />
    <meta name="theme-color" content="#0D0806" />
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <link rel="manifest" href="/manifest.json?v=6" />
    <link rel="icon" type="image/png" href="/logo192.png?v=6" />
    <link rel="apple-touch-icon" href="/logo192.png?v=6" />

    <title>Pankey</title>

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=Sora:wght@200;300;400;600;700&display=swap" rel="stylesheet">

    <style>
      html, body {
        touch-action: manipulation; /* Mata el zoom al hacer doble toque rápido */
        -webkit-text-size-adjust: 100%;
        overflow: hidden; /* Congela el fondo para que no rebote al llegar al final */
      }
      #root {
        touch-action: pan-x pan-y;
      }
      /* App nativa: al mantener oprimido NO se selecciona el texto ni sale el menú copiar/compartir */
      * {
        -webkit-user-select: none;
        -moz-user-select: none;
        -ms-user-select: none;
        user-select: none;
        -webkit-touch-callout: none;
        -webkit-tap-highlight-color: transparent;
      }
      /* …excepto donde el usuario SÍ debe poder escribir/seleccionar */
      input, textarea, [contenteditable="true"] {
        -webkit-user-select: text;
        -moz-user-select: text;
        -ms-user-select: text;
        user-select: text;
      }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>

    <script>
      document.addEventListener('gesturestart', function (e) {
          e.preventDefault();
      });
      document.addEventListener('touchstart', function(event) {
          if (event.touches.length > 1) {
              event.preventDefault(); // Bloquea si detecta más de un dedo en la pantalla
          }
      }, { passive: false });
    </script>
  </body>
</html>
